<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>VideoWebsite</title>
    </head>
    <body>
        <!--Option to make video a hyperlink as well not necessary
        When you click the video sends you to Zelda Wikipedia Page-->
        <a  target="_blank" href="//en.wikipedia.org/wiki/The_Legend_of_Zelda">
            <video src="Videos/Zelda.MOV"
            width="500px" controls autoplay muted loop type="video/MOV">
            </video>
    </a>

        <source src="Videos/Zelda.MOV" type="video/MOV">
        <source src="Videos/Zelda.mp4" type="video/mp4"> -->
    </body>
</html>
