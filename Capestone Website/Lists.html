<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>ListWebsite</title>
    </head>
<body>
    <!--Unordered List-->
    <h4>Groceries</h4>
    <ul>
        <li>milk</li>
        <li>eggs</li>
        <li>bread</li>
        <li>coffee supplies</li>
        <ul>
            <li>coffee beans</li>
            <li>creamer</li>
            <li>sugar</li>
        </ul>
    </ul>

    <!--Ordered List-->
    <h4>To do List</h4>
    <ol>
        <li>eat breakfast</li>
        <li>go to class</li>
        <li>walk the dog</li>
        <li>go to work</li>
    </ol>

    <!--Description List-->
    <!--Made of key value pairs. You have a term and then a definition-->
    <h4>Mythical creatures</h4>
    <dl style="background-color: aquamarine; border:2px solid">
        <dt>dragon</dt>
        <dd>Fire breathing monster</dd>
        <dt>phoenix</dt>
        <dd>Imortal bird</dd>
        <dt>vampire</dt>
        <dd>Sucks blood</dd>
        <dt>werewolf</dt>
        <dd>Wolf man</dd>
    </dl>
</body>
</html>
