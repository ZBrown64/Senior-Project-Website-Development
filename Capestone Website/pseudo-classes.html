    <title>Pseudo-Classes</title>
    <link rel="stylesheet" href="CSSFiles/pseudo-classes.css">
</head>
<body>
    <!--pseudo classes are keywords added to a selector
    modify the behavior of an element when they are on in certain state-->
    <a href="https://google.com">Google</a> <!--A link is a pseudo class-->
    <ul>
        <li>This #1</li>
        <li>This #2</li>
        <li>This #3</li>
        <li>This #4</li>
        <li>This #5</li>
        <li>This #6</li>
        <li>This #7</li>
        <li>This #8</li>
        <li>This #9</li>
    </ul>
    <div id="greeting">Hover here
        <p>Hello</p>
    </div>
</body>
</html>
